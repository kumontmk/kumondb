<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#87CEEB">
  <title>Reports - Kumon DB</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📋 Reports</h1>
    <nav>
      <a href="dashboard.html">← Centers</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>
  
  <main class="reports-page">
    <div class="report-tabs">
      <button class="tab-btn active" data-tab="timetable">📅 Timetable</button>
      <button class="tab-btn" data-tab="monthly">📊 Monthly Report</button>
    </div>
    
    <!-- Timetable Section -->
    <section id="timetable" class="report-section active">
      <div class="controls">
        <select id="timetableDay">
          <option value="mon">Monday</option>
          <option value="tue">Tuesday</option>
          <option value="wed">Wednesday</option>
          <option value="thu">Thursday</option>
          <option value="fri">Friday</option>
          <option value="sat">Saturday</option>
        </select>
        <button id="printTimetable" class="secondary">🖨️ Print</button>
      </div>
      <div id="timetableGrid" class="timetable-grid">
        <!-- Dynamically populated -->
      </div>
    </section>
    
    <!-- Monthly Report Section -->
    <section id="monthly" class="report-section hidden">
      <div class="controls">
        <select id="reportSubject">
          <option value="all">All Subjects</option>
          <option value="English ERP">English ERP</option>
          <option value="English EFL">English EFL</option>
          <option value="Chinese">Chinese</option>
          <option value="Math">Math</option>
        </select>
        <input type="month" id="reportMonth">
        <button id="generateReport" class="primary">Generate</button>
        <button id="printReport" class="secondary">🖨️ Print</button>
      </div>
      <div id="monthlyReport" class="report-table">
        <table>
          <thead>
            <tr>
              <th>Student No</th>
              <th>Chinese Name</th>
              <th>English Name</th>
              <th>Grade</th>
              <th>Prev Level</th>
              <th>Prev WS</th>
              <th>Current Level</th>
              <th>Current WS</th>
              <th>Test Level</th>
              <th>Score</th>
              <th>Time</th>
              <th>Group</th>
            </tr>
          </thead>
          <tbody id="reportBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="js/reports.js"></script>
</body>
</html>
