<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Reports - Kumon DB</title>
  <!-- <link rel="stylesheet" href="style.css"> -->
  <link rel="stylesheet" href="reports.css">
</head>
<body>
  <header>
    <h1>📊 Monthly Reports</h1>
    <nav>
      <a href="dashboard.html">← Dashboard</a>
      <button id="logoutBtn" type="button">Logout</button>
    </nav>
  </header>

  <main class="form-container">
    <!-- 🆕 CARD-BASED SUBJECT SELECTOR -->
    <div id="subjectSelector" class="center-grid subject-grid">
      <div class="center-card subject-card active" data-subject="all">📚 All Subjects</div>
      <div class="center-card subject-card" data-subject="Math">🔢 Math</div>
      <div class="center-card subject-card" data-subject="Chinese">🀄 Chinese</div>
      <div class="center-card subject-card" data-subject="English ERP">🔤 English ERP</div>
      <div class="center-card subject-card" data-subject="English EFL">🌍 English EFL</div>
    </div>

    <!-- 🛠️ FIXED CONTROLS LAYOUT -->
    <div class="controls">
      <div class="control-group">
        <label for="reportMonth" class="control-label">📅 Month</label>
        <input type="month" id="reportMonth" required>
      </div>
      <button id="generateReport" type="button" class="primary action-btn">📊 Generate</button>
      <button id="printReport" type="button" class="print-btn">
        <span class="print-icon">🖨️</span>
        <span class="print-text">Print</span>
      </button>
    </div>

    <!-- 📊 SCROLLABLE REPORT AREA -->
    <div id="monthlyReport" class="hidden">
      <div id="reportOutput"></div>
    </div>
    
    <!-- 💾 STICKY SAVE BAR -->
    <div class="save-bar">
      <button id="saveReportBtn" type="button" class="primary" style="display:none;">💾 Save Changes</button>
    </div>
  </main>

  <div id="page-loader" class="hidden"><div class="spinner"></div></div>
  <script type="module" src="reports.js"></script>
</body>
</html>
