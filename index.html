<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kumon Center DB - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div id="page-loader"><div class="spinner"></div></div>
  
  <div class="login-container">
    <img src="logo.png" alt="Kumon Logo" class="login-logo">
    <p>Sign in to manage students & reports</p>
    
    <button id="googleSignInBtn" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.2 0 6.1 1.2 8.3 3.1l6.6-6.6C34.1 4.2 29.3 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11.2 0 20.5-8.4 20.5-22 0-1.5-.2-2.9-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15.3 14.2 19.3 12 24 12c3.2 0 6.1 1.2 8.3 3.1l6.6-6.6C34.1 4.2 29.3 2 24 2 15.1 2 8.3 7.6 6.3 14.7z"/><path fill="#FBBC05" d="M24 46c6.3 0 11.5-2.1 15.3-5.6l-7.2-5.9C29.9 36.2 27.2 37 24 37c-6.1 0-11.3-4.1-13.2-9.7l-7 5.4C6.9 40.3 14.8 46 24 46z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.7C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.2 0 6.1 1.2 8.3 3.1l6.6-6.6C34.1 4.2 29.3 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11.2 0 20.5-8.4 20.5-22 0-1.5-.2-2.9-.5-4z"/></svg>
      Continue with Google
    </button>
    
    <div class="divider">OR</div>
    
    <form id="emailAuthForm" class="auth-form">
      <input type="email" id="email" placeholder="Email address" required autocomplete="email">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
    <p id="errorMsg" class="error"></p>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
