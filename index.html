<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#87CEEB">
  <title>Kumon Center DB - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <!-- Loading Overlay -->
  <div id="page-loader">
    <div class="spinner"></div>
  </div>

  <div class="login-container">
    <h1>📚 Kumon Center DB</h1>
    <form id="loginForm">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="Enter password">
      <button type="submit">Login</button>
      <p id="errorMsg" class="error"></p>
    </form>
  </div>

  <!-- Loader Controller -->
  <script>
    // Hide loader once DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('page-loader');
      if (loader) loader.classList.add('hidden');
    });

    // Global helpers for async operations (login, data fetches, etc.)
    window.showLoader = () => document.getElementById('page-loader')?.classList.remove('hidden');
    window.hideLoader = () => document.getElementById('page-loader')?.classList.add('hidden');
  </script>

  <script type="module" src="auth.js"></script>
</body>
</html>
