<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timecard - Kumon DB</title>
  <link rel="stylesheet" href="timecard.css">
</head>
<body>
  <header>
    <div class="logo">⏱️ Employee Timecard</div>
    <nav>
      <a href="dashboard.html">← Dashboard</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main class="dashboard">
    <div class="attendance-controls">
      <div class="control-group">
        <label class="control-label">Date</label>
        <input type="date" id="datePicker" class="day-select">
      </div>

      <div class="control-group search-group">
        <label class="control-label">Search / Filter</label>
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search by name...">
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">Position</label>
        <select id="positionFilter">
          <option value="">All Positions</option>
          <option value="English Teacher">English Teacher</option>
          <option value="Math Teacher">Math Teacher</option>
          <option value="Chinese Teacher">Chinese Teacher</option>
          <option value="Admin">Admin</option>
          <option value="Manager">Manager</option>
        </select>
      </div>

      <button id="startScanBtn" class="scan-btn">📷 Start QR Scan</button>
      <button id="exportCsvBtn" class="export-csv-btn">📥 Export CSV</button>
    </div>

    <div class="table-wrapper">
      <table id="timecardTable">
          <thead>
            <tr>
              <th>Chinese Name</th>
              <th>English Name</th>
              <th>Position</th>
              <th>Time</th>
              <th>Center</th>
              <th>Status</th>
            </tr>
          </thead>
        <tbody id="timecardBody">
          <tr><td colspan="6" class="empty-state">Select a date to view attendance</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Scanner Modal -->
  <div id="scanModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeScan" class="close-btn">×</button>
      <h3>📷 Scan Employee QR</h3>
      <p id="scanStatus">Position QR in the frame</p>
      <div id="reader"></div>
      <button id="stopScanBtn" class="secondary-btn" style="margin-top: 1rem; background: #6c757d; color: white;">Stop Scanner</button>
    </div>
  </div>

  <!-- External QR Library -->
<!-- ✅ SCAN RESULT MODAL -->
<div id="scanResultModal" class="result-modal hidden">
  <div class="result-content">
    <div id="resultIcon" class="result-icon">✅</div>
    <div id="resultMessage" class="result-text">Processing...</div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script src="timecard.js" type="module"></script>
</body>
</html>
