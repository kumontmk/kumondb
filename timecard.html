<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timecard - Kumon DB</title>
  <link rel="stylesheet" href="timecard.css">
</head>
<body>
  <header>
    <h1>⏱️ Employee Timecard</h1>
    <nav>
      <a href="dashboard.html">← Dashboard</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main class="container">
    <div class="attendance-controls">
      <div class="control-group">
        <label class="control-label" for="datePicker">Date</label>
        <input type="date" id="datePicker" class="day-select">
      </div>

      <div class="control-group search-group">
        <label class="control-label" for="searchInput">Search</label>
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Name...">
        </div>
      </div>

      <div class="control-group">
        <label class="control-label" for="positionFilter">Position</label>
        <select id="positionFilter">
          <option value="">All Positions</option>
          <option value="English Teacher">English Teacher</option>
          <option value="Math Teacher">Math Teacher</option>
          <option value="Chinese Teacher">Chinese Teacher</option>
          <option value="Admin">Admin</option>
          <option value="Manager">Manager</option>
        </select>
      </div>

      <button id="startScanBtn" class="scan-btn">📷 Start QR Scan</button>
      <button id="exportCsvBtn" class="export-csv-btn">📥 Export CSV</button>
      
      <!-- ✅ NEW: Manual QR Entry -->
      <div class="manual-qr-group">
        <input type="text" id="manualQrInput" class="day-select" placeholder="Or type QR code..." autocomplete="off">
        <button id="manualQrBtn" class="scan-btn">🔍 Submit</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Chinese Name</th>
            <th>English Name</th>
            <th>Position</th>
            <th>Time</th>
            <th>Center</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="timecardBody">
          <tr><td colspan="6" class="empty-state">Select a date to view attendance</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Scan Modal -->
  <div id="scanModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeScan" class="close-btn">&times;</button>
      <h3>📷 Scan Employee QR</h3>
      <p>Position QR in the frame</p>
      <div id="reader"></div>
      <button id="stopScanBtn" class="scan-btn" style="margin-top: 1rem;">Stop Scanner</button>
    </div>
  </div>

  <!-- Script -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script type="module" src="timecard.js"></script>
</body>
</html>
