<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Kumon DB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <header>
        <h2>📅 Attendance Management</h2>
        <nav>
            <a href="dashboard.html">← Dashboard</a>
        </nav>
    </header>

    <div class="students-page">
        <div class="attendance-controls">
            <div class="control-group">
                <label class="control-label" for="attendanceDate">📅 Date</label>
                <input type="date" id="attendanceDate" class="day-select">
            </div>
            
            <div class="control-group">
                <label class="control-label" for="attendanceSubject">📚 Subject</label>
                <select id="attendanceSubject" class="day-select">
                    <option value="All">All Subjects</option>
                </select>
            </div>

            <div class="control-group search-group">
                <label class="control-label" for="searchStudent">🔍 Search Student</label>
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchStudent" placeholder="Name, Nickname, or Number...">
                    <button class="clear-search" id="clearSearchBtn">×</button>
                </div>
            </div>

            <button id="scanQrBtn" class="scan-btn">
                <span class="scan-icon">📷</span>
                <span>Scan QR</span>
            </button>
        </div>

        <div class="table-container">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Chinese Name</th>
                        <th>Nickname</th>
                        <th>Grade</th>
                        <th>School</th>
                        <th>Scheduled Time</th>
                        <th>Check-in Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody">
                    <tr>
                        <td colspan="9" style="text-align:center; padding:1rem; color:#666;">Loading attendance...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 📷 Scan Modal -->
    <div id="scanModal" class="modal hidden" style="display: none;">
        <div class="modal-content">
            <span id="closeScanModal">×</span>
            <h3 style="text-align: center; margin-bottom: 1rem;">📷 Scan Student QR</h3>
            <p style="text-align: center; color: #64748b;">Point camera at QR code...</p>
            <div id="qr-reader" style="width: 100%; max-width: 300px; margin: 1rem auto;"></div>
            <p id="qr-status" style="margin-top: 1rem; font-weight: 500; text-align: center;"></p>
        </div>
    </div>

    <!-- ✅ Confirm Attendance Modal (Cleanly Formatted) -->
    <div id="confirmModal" class="modal hidden" style="display: none;">
        <div class="modal-content">
            <span id="closeConfirmModal">×</span>
            <h3 style="text-align: center; margin-bottom: 1rem; color: #1e293b;">✅ Confirm Attendance</h3>
            
            <div id="studentInfo" style="margin-bottom: 1rem;"></div>
            <div id="subjectCheckboxes" style="margin-bottom: 1.5rem;"></div>
            
            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                <button id="cancelConfirmBtn" class="secondary">Cancel</button>
                <button id="confirmAttendanceBtn" class="primary" style="display: none;">Confirm Attendance</button>
            </div>
        </div>
    </div>

    <script type="module" src="attendance.js"></script>
</body>
</html>
