<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Schedule - Kumon DB</title>
<link rel="stylesheet" href="employee-schedule.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="page-loader"><div class="spinner"></div></div>

<header>
    <nav>
        <a href="centers.html">← Centers</a>
    </nav>
    <h2>📅 Employee Schedule</h2>
</header>

<div class="schedule-dashboard">

    <!-- TABS -->
    <div class="schedule-tabs">
        <button class="tab-btn active" data-tab="admin"><i class="fas fa-users-cog"></i> Admin View</button>
        <button class="tab-btn" data-tab="center"><i class="fas fa-building"></i> Per Center</button>
        <button class="tab-btn" data-tab="subject"><i class="fas fa-book"></i> Per Subject</button>
        <button class="tab-btn" data-tab="employee"><i class="fas fa-user"></i> Employee View</button>
    </div>

    <!-- ADMIN VIEW TAB -->
    <div class="tab-content active" id="tab-admin">
        <div class="schedule-toolbar">
            <div class="nav-group">
                <button class="nav-btn" id="prevWeekBtn"><i class="fas fa-chevron-left"></i> Prev</button>
                <span class="week-range" id="weekRangeDisplay">Loading...</span>
                <button class="nav-btn" id="nextWeekBtn">Next <i class="fas fa-chevron-right"></i></button>
                <button class="nav-btn today-btn" id="todayBtn">Today</button>
            </div>
            <div class="nav-group">
                <button class="action-btn primary" id="applyPatternBtn"><i class="fas fa-magic"></i> Apply Patterns to Month</button>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="schedule-table">
                <thead><tr id="adminHeaderRow"></tr></thead>
                <tbody id="adminBody"></tbody>
            </table>
        </div>
        <div class="empty-state hidden" id="adminEmptyState">
            <i class="fas fa-users" style="font-size:3rem;color:#ccc;margin-bottom:1rem;"></i>
            <p>No employees found. Add employees first.</p>
        </div>
    </div>

    <!-- PER CENTER TAB -->
    <div class="tab-content" id="tab-center">
        <div class="schedule-toolbar">
            <div class="nav-group">
                <label style="font-size:0.85rem;font-weight:600;color:var(--text-light);">Center:</label>
                <select id="centerDropdown" style="padding:0.4rem 0.8rem;border:1px solid #cbd5e1;border-radius:6px;font-size:0.85rem;min-width:220px;"></select>
            </div>
            <div class="nav-group">
                <button class="nav-btn" id="centerPrevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
                <span class="week-range" id="centerWeekRangeDisplay">Loading...</span>
                <button class="nav-btn" id="centerNextBtn">Next <i class="fas fa-chevron-right"></i></button>
                <button class="nav-btn today-btn" id="centerTodayBtn">Today</button>
            </div>
            <div class="nav-group">
                <button class="action-btn primary print-btn" id="printCenterBtn"><i class="fas fa-print"></i> Print Schedule</button>
            </div>
        </div>
        <div class="table-wrapper" id="centerTableWrapper">
            <table class="schedule-table center-view-table">
                <thead><tr id="centerHeaderRow"></tr></thead>
                <tbody id="centerBody"></tbody>
            </table>
        </div>
        <div class="empty-state hidden" id="centerEmptyState">
            <i class="fas fa-building" style="font-size:3rem;color:#ccc;margin-bottom:1rem;"></i>
            <p>No employees scheduled at this center for this period.</p>
        </div>
    </div>

    <!-- PER SUBJECT TAB -->
    <div class="tab-content" id="tab-subject">
        <div class="schedule-toolbar">
            <div class="nav-group">
                <label style="font-size:0.85rem;font-weight:600;color:var(--text-light);">Subject:</label>
                <select id="subjectDropdown" style="padding:0.4rem 0.8rem;border:1px solid #cbd5e1;border-radius:6px;font-size:0.85rem;min-width:220px;">
                    <option value="all">All Subjects</option>
                    <option value="English Teacher">English</option>
                    <option value="Math Teacher">Math</option>
                    <option value="Chinese Teacher">Chinese</option>
                </select>
            </div>
            <div class="nav-group">
                <button class="nav-btn" id="subjectPrevBtn"><i class="fas fa-chevron-left"></i> Prev</button>
                <span class="week-range" id="subjectWeekRangeDisplay">Loading...</span>
                <button class="nav-btn" id="subjectNextBtn">Next <i class="fas fa-chevron-right"></i></button>
                <button class="nav-btn today-btn" id="subjectTodayBtn">Today</button>
            </div>
            <div class="nav-group">
                <button class="action-btn primary print-btn" id="printSubjectBtn"><i class="fas fa-print"></i> Print Schedule</button>
            </div>
        </div>
        <div class="table-wrapper" id="subjectTableWrapper">
            <table class="schedule-table subject-view-table">
                <thead><tr id="subjectHeaderRow"></tr></thead>
                <tbody id="subjectBody"></tbody>
            </table>
        </div>
        <div class="empty-state hidden" id="subjectEmptyState">
            <i class="fas fa-book" style="font-size:3rem;color:#ccc;margin-bottom:1rem;"></i>
            <p>No teachers found for this subject.</p>
        </div>
    </div>

    <!-- EMPLOYEE VIEW TAB -->
    <div class="tab-content" id="tab-employee">
        <div class="schedule-toolbar">
            <div class="nav-group">
                <button class="nav-btn" id="empPrevWeekBtn"><i class="fas fa-chevron-left"></i> Prev</button>
                <span class="week-range" id="empWeekRangeDisplay">Loading...</span>
                <button class="nav-btn" id="empNextWeekBtn">Next <i class="fas fa-chevron-right"></i></button>
                <button class="nav-btn today-btn" id="empTodayBtn">Today</button>
            </div>
            <div class="employee-selector hidden" id="employeeSelectorWrap">
                <label>View schedule for:</label>
                <select id="employeeDropdown"></select>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="schedule-table">
                <thead><tr id="empHeaderRow"></tr></thead>
                <tbody id="empBody"></tbody>
            </table>
        </div>
        <div class="empty-state hidden" id="empEmptyState">
            <i class="fas fa-calendar-times" style="font-size:3rem;color:#ccc;margin-bottom:1rem;"></i>
            <p>No schedule assigned. Contact your manager.</p>
        </div>
    </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="scheduleModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modalTitle">Edit Schedule</h2>
            <button class="modal-close" id="modalCloseBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-date-info" id="modalDateInfo"></div>
            <div class="modal-warnings" id="modalWarnings"></div>
            <fieldset class="shift-group">
                <legend>🕐 Shifts</legend>
                <div class="shifts-container" id="shiftsContainer"></div>
                <button type="button" class="add-shift-btn" id="addShiftBtn"><i class="fas fa-plus"></i> Add Shift</button>
            </fieldset>
            <fieldset class="shift-group">
                <legend> Status</legend>
                <div class="shift-fields">
                    <label>
                        Status
                        <select id="scheduleStatus" class="center-select">
                            <option value="scheduled">Scheduled</option>
                            <option value="other-center">Other Centers</option>
                            <option value="leave">On Leave</option>
                            <option value="sick">Sick</option>
                            <option value="off">Day Off</option>
                        </select>
                    </label>
                </div>
            </fieldset>
            <fieldset class="shift-group">
                <legend>📝 Notes</legend>
                <textarea id="scheduleNotes" rows="2" placeholder="Optional notes..."></textarea>
            </fieldset>
            <div class="pattern-option">
                <label>
                    <input type="checkbox" id="saveAsPattern">
                    Save as recurring pattern for every <strong id="patternDayName">Monday</strong>
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-danger" id="clearDayBtn">Clear Day</button>
            <div class="modal-footer-right">
                <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
                <button class="btn-primary" id="saveScheduleBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- PRINT AREA -->
<div id="printArea"></div>

<script type="module" src="employee-schedule.js"></script>
</body>
</html>
