<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - Kumon DB</title>
    <link rel="stylesheet" href="timetable.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="page-loader">
        <div class="spinner"></div>
    </div>

    <!-- Access Denied -->
    <div id="accessDenied" class="access-denied hidden">
        <div class="access-denied-content">
            <h2>🔐 Access Restricted</h2>
            <p>You do not have permission to view the Timetable.</p>
            <button id="backToDashboardBtn" class="primary">← Back to Dashboard</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <nav>
            <a href="dashboard.html">← Dashboard</a>
        </nav>
        <h1>📅 Class Timetable</h1>
    </header>

    <!-- Main Content -->
    <div id="mainContent" class="main-content hidden">
        
        <!-- Global Controls (Only Print Button now) -->
        <div class="timetable-controls">
            <button id="printTimetable" class="print-btn">🖨️ Print Timetable</button>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="dayView">Day View</button>
            <button class="tab-btn" data-tab="weekView">Whole Week View</button>
        </div>

        <!-- Day View Container -->
        <div id="dayViewContainer" class="tab-content active">
            <!-- ✅ Day Selection moved here so it only shows in Day View -->
            <div class="day-view-controls">
                <div class="control-group">
                    <label class="control-label" for="timetableDay">Select Day</label>
                    <select id="timetableDay" class="day-select">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                    </select>
                </div>
            </div>

            <div class="timetable-wrapper">
                <table id="timetableTable">
                    <colgroup>
                        <col class="col-time">
                        <col class="col-grade"><col class="col-name"><col class="col-level">
                        <col class="col-grade"><col class="col-name"><col class="col-level">
                        <col class="col-grade"><col class="col-name"><col class="col-level">
                        <col class="col-grade"><col class="col-name"><col class="col-level">
                    </colgroup>
                    <thead>
                        <tr>
                            <th rowspan="2">Time</th>
                            <th colspan="3" class="th-math">Math (6A–E)</th>
                            <th colspan="3" class="th-math">Math (F+)</th>
                            <th colspan="3" class="th-english">English</th>
                            <th colspan="3" class="th-chinese">Chinese</th>
                        </tr>
                        <tr>
                            <th>Gr</th><th>Name</th><th>Lvl</th>
                            <th>Gr</th><th>Name</th><th>Lvl</th>
                            <th>Gr</th><th>Name</th><th>Lvl</th>
                            <th>Gr</th><th>Name</th><th>Lvl</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <tr>
                            <td colspan="13" style="text-align:center; padding:2rem;">Loading timetable...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Week View Container -->
        <div id="weekViewContainer" class="tab-content">
            <div class="week-view-info">
                <span id="weekRangeLabel" class="week-range-label"></span>
            </div>
            <div class="timetable-wrapper">
                <table id="weekTimetableTable">
                    <colgroup>
                        <col class="col-time">
                        <col class="col-weekday" span="7">
                    </colgroup>
                    <thead>
                        <tr id="weekDateRow">
                            <th rowspan="2" class="th-time">Time</th>
                        </tr>
                        <tr id="weekDayRow">
                        </tr>
                    </thead>
                    <tbody id="weekTimetableBody">
                        <tr>
                            <td colspan="8" style="text-align:center; padding:2rem;">Select "Whole Week View" tab to load.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="timetable.js"></script>
</body>
</html>
