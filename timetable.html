<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - Kumon DB</title>
    <link rel="stylesheet" href="timetable.css">
</head>
<body>
    <!-- 🔐 ACCESS DENIED OVERLAY -->
    <div id="accessDenied" class="access-denied hidden">
        <div class="access-denied-content">
            <h2>🔐 Access Restricted</h2>
            <p>You do not have permission to view the Timetable.</p>
            <button id="backToDashboardBtn" class="primary" style="margin-top:1rem">← Back to Dashboard</button>
        </div>
    </div>

    <div id="page-loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <!-- ✅ MAIN CONTENT WRAPPER -->
    <div id="mainContent" class="hidden">

        <header>
            <nav>
                <a href="dashboard.html">← Dashboard</a>
            </nav>
            <h1>📅 Class Timetable</h1>
        </header>

        <div class="main-content">
            <div class="timetable-controls">
                <div class="control-group">
                    <label class="control-label">Select Day</label>
                    <select id="timetableDay" class="day-select">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                    </select>
                </div>
                <button id="printTimetable" class="print-btn">
                    <span class="print-icon">🖨️</span>
                    <span class="print-text">Print Timetable</span>
                </button>
            </div>

            <div class="timetable-wrapper">
                <table id="timetableTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th colspan="3" class="th-math">Math (6A–E)</th>
                            <th colspan="3" class="th-math">Math (F+)</th>
                            <th colspan="3" class="th-english">English</th>
                            <th colspan="3" class="th-chinese">Chinese</th>
                        </tr>
                        <tr>
                            <th></th>
                            <th>Grade</th><th>Name</th><th>Level</th>
                            <th>Grade</th><th>Name</th><th>Level</th>
                            <th>Grade</th><th>Name</th><th>Level</th>
                            <th>Grade</th><th>Name</th><th>Level</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <tr><td colspan="13" class="hint" style="text-align:center;">Loading timetable...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module" src="timetable.js"></script>
</body>
</html>
