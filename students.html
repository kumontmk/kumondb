<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#87CEEB">
    <title>Student Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-[#87CEEB] p-4 text-white shadow-md flex justify-between items-center">
        <h1 class="font-bold text-lg" id="centerDisplay">Kumon DB</h1>
        <button onclick="logout()" class="text-sm underline">Logout</button>
    </nav>

    <div class="max-w-4xl mx-auto p-4 mt-6">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Add New Student</h2>
            
            <form id="addStudentForm" class="space-y-4">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="text-sm">Student Number</label><input type="text" id="stuNum" class="w-full border p-2 rounded" required></div>
                    <div><label class="text-sm">English Name</label><input type="text" id="engName" class="w-full border p-2 rounded" required></div>
                </div>

                <!-- Subject Selection (With Logic) -->
                <div class="bg-gray-50 p-4 rounded border mt-4">
                    <h3 class="font-semibold mb-2">Subjects (Max 3. ERP & EFL cannot mix)</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2" id="subjectCheckboxes">
                        <label><input type="checkbox" value="Math" class="sub-check"> Math</label>
                        <label><input type="checkbox" value="Chinese" class="sub-check"> Chinese</label>
                        <label><input type="checkbox" value="ERP" class="sub-check erp-efl"> English ERP</label>
                        <label><input type="checkbox" value="EFL" class="sub-check erp-efl"> English EFL</label>
                    </div>
                    <p id="subError" class="text-red-500 text-xs mt-2 hidden">Validation error.</p>
                </div>

                <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 w-full md:w-auto">Save Student</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-cfg.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // Security & Setup
        if(sessionStorage.getItem('authenticated') !== 'true') window.location.href = 'index.html';
        const currentCenter = sessionStorage.getItem('currentCenter');
        document.getElementById('centerDisplay').innerText = `Kumon DB - ${currentCenter}`;

        window.logout = () => { sessionStorage.clear(); window.location.href = 'index.html'; }

        // Subject Logic (ERP vs EFL & Max 3)
        const checkboxes = document.querySelectorAll('.sub-check');
        const erpBox = document.querySelector('input[value="ERP"]');
        const eflBox = document.querySelector('input[value="EFL"]');
        const subError = document.getElementById('subError');

        checkboxes.forEach(box => {
            box.addEventListener('change', () => {
                let checkedCount = document.querySelectorAll('.sub-check:checked').length;
                
                // Exclusivity logic
                if (box === erpBox && erpBox.checked) eflBox.disabled = true;
                if (box === erpBox && !erpBox.checked) eflBox.disabled = false;
                if (box === eflBox && eflBox.checked) erpBox.disabled = true;
                if (box === eflBox && !eflBox.checked) erpBox.disabled = false;

                // Max 3 logic
                if (checkedCount >= 3) {
                    checkboxes.forEach(b => { if(!b.checked) b.disabled = true; });
                } else {
                    checkboxes.forEach(b => { 
                        // Re-enable, but maintain ERP/EFL lock
                        if (b === eflBox && erpBox.checked) return;
                        if (b === erpBox && eflBox.checked) return;
                        b.disabled = false; 
                    });
                }
            });
        });

        // Submit to Firebase
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const selectedSubjects = Array.from(document.querySelectorAll('.sub-check:checked')).map(cb => cb.value);
            if(selectedSubjects.length === 0) {
                subError.innerText = "Please select at least one subject.";
                subError.classList.remove('hidden');
                return;
            }

            // Initialize subject objects with "New" status
            const subjectsData = {};
            selectedSubjects.forEach(sub => {
                subjectsData[sub] = {
                    status: "New",
                    startLevel: "",
                    startDate: new Date().toISOString(),
                    timeslot: "",
                    history: [] // For monthly updates
                };
            });

            try {
                // Save to a collection specific to the chosen center
                await addDoc(collection(db, `centers/${currentCenter}/students`), {
                    studentNum: document.getElementById('stuNum').value,
                    englishName: document.getElementById('engName').value,
                    subjects: subjectsData,
                    createdAt: serverTimestamp()
                });
                alert('Student added successfully!');
                e.target.reset();
                checkboxes.forEach(b => b.disabled = false); // reset locks
            } catch (error) {
                console.error("Error adding document: ", error);
                alert('Failed to add student. See console.');
            }
        });
    </script>
</body>
</html>
