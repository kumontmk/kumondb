<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Kumon DB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">Loading students...</div>
  
  <header>
    <h1>👥 Student Management</h1>
    <nav>
      <a href="dashboard.html">← Back</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <main class="students-page">
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by name, ID, nickname, or school...">
      <button id="addStudentBtn" class="primary">+ Add Student</button>
    </div>

    <div class="report-table">
      <table id="studentTable">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Student ID</th>
              <th>Chinese name</th>
              <th>Nickname</th>
              <th>Pinyin name</th>
              <th>DOB</th>
              <th>Grade</th>
              <th>Level</th>
              <th>Enrol Date</th>
            </tr>
          </thead>
        <tbody id="studentList">
          <!-- Table rows injected by JS -->
        </tbody>
      </table>
    </div>
  </main>

  <script type="module" src="students.js"></script>
</body>
</html>
