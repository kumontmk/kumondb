<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#87CEEB">
  <title>Students - Kumon DB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container"><div class="spinner"></div><p class="loading-text">Loading students</p></div>
  </div>

  <header>
    <h1>👥 Student Management</h1>
    <nav>
      <a href="dashboard.html">← Back</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>
  
  <main class="students-page">
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by name, number, school...">
      <button id="addStudentBtn" class="primary">+ Add Student</button>
    </div>
    
    <div class="student-list" id="studentList"></div>
  </main>

  <script type="module" src="students.js"></script>
  <script type="module">
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('kumonAuth');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
