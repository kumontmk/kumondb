<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Orientation - Kumon DB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="parent-orientation.css">
</head>
<body>
    <!-- 🔐 ACCESS DENIED OVERLAY -->
    <div id="accessDenied" class="access-denied hidden">
        <div class="access-denied-content">
            <h2>🔐 Access Restricted</h2>
            <p>You do not have permission to view Parent Orientation.</p>
            <button id="backToDashboardBtn" class="primary" style="margin-top:1rem">← Back to Dashboard</button>
        </div>
    </div>

    <div id="page-loader" class="hidden"><div class="spinner"></div></div>

    <!-- ✅ MAIN CONTENT WRAPPER (Hidden by default until authorized) -->
    <div id="mainContent" class="hidden">
        
        <header>
            <nav>
                <a href="dashboard.html">← Dashboard</a>
            </nav>
            <h1>📋 Pending Parent Orientation</h1>
        </header>

        <main class="po-container">
            <div class="controls">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, grade, or reason...">
                <button id="refreshBtn" class="secondary">🔄 Refresh</button>
            </div>

            <div class="table-wrapper">
                <table id="poTable">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Grade</th>
                            <th>Subjects & Levels</th>
                            <th>Enrol Date</th>
                            <th>Reason / Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="poTableBody">
                        <tr><td colspan="6" class="empty-state">Loading students...</td></tr>
                    </tbody>
                </table>
                <div id="noResults" class="empty-state">No students pending orientation.</div>
            </div>
            
            <!-- Loader inside table wrapper -->
            <div id="poLoader" class="loader-overlay hidden">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </main>

    </div> <!-- ✅ End of mainContent wrapper -->

    <script type="module" src="parent-orientation.js"></script>
</body>
</html>
